<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALAKI11</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="game">
            <div class="info">
                <div class="score">Score: <span>0</span></div>
                <div class="h-score">Highest Score: <span>0</span></div>
            </div>
            <div class="game-field">
                <div class="row-con">
                    <div class="row ali">
                        <div class="platform"></div>
                    </div>
                </div>
                <div class="player">
                    <img src="assets/character.png" alt="">
                </div>
                <div class="game-over">
                    GAME OVER
                </div>
            </div>

        </div>
    </div>
</body>
<script src="jquery-3.3.1.js"></script>
<script src="scripts.js"></script>

</html>
